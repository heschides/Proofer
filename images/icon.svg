<svg width="1024" height="1024" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6c27a"></stop>
      <stop offset="50%" stop-color="#e09a3e"></stop>
      <stop offset="100%" stop-color="#c8741f"></stop>
    </linearGradient>

    <radialGradient id="highlight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"></stop>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"></stop>
    </radialGradient>
  </defs>

  <!-- Leaf Shape -->
  <path d="
    M256 40
    C300 120, 340 200, 320 300
    C300 380, 220 420, 256 480
    C200 420, 140 380, 160 300
    C180 200, 220 120, 256 40
    Z" fill="url(#goldGradient)"></path>

  <!-- Center vein -->
  <path d="M256 60 L256 460" stroke="#a85c1a" stroke-width="3" opacity="0.6"></path>

  <!-- Subtle highlight -->
  <ellipse cx="256" cy="200" rx="120" ry="180" fill="url(#highlight)"></ellipse>

</svg>